services:
  pgvector:
    image: pgvector/pgvector:pg16
    ports:
      - "0.0.0.0:5433:5432"  # Use port 5433 to avoid conflict with mehedi
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - firecrawl_docling_postgres_data:/var/lib/postgresql/data
      
    restart: unless-stopped

volumes:
  firecrawl_docling_postgres_data:

networks:
  default:
    name: firecrawl_docling_network
    external: true
